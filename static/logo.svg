<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 50">
  <defs>
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a73e8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#4285f4;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.2"/>
    </filter>
  </defs>
  
  <!-- Database Icon -->
  <g transform="translate(5, 8)" filter="url(#shadow)">
    <ellipse cx="18" cy="6" rx="14" ry="5" fill="url(#logoGradient)" opacity="0.9"/>
    <path d="M4 6v20c0 2.8 6.3 5 14 5s14-2.2 14-5V6" fill="url(#logoGradient)" opacity="0.9"/>
    <ellipse cx="18" cy="26" rx="14" ry="5" fill="url(#logoGradient)" opacity="0.9"/>
    <path d="M4 16c0 2.8 6.3 5 14 5s14-2.2 14-5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
    <path d="M4 21c0 2.8 6.3 5 14 5s14-2.2 14-5" fill="none" stroke="white" stroke-width="1.5" opacity="0.4"/>
  </g>
  
  <!-- Chat Bubble -->
  <g transform="translate(38, 18)">
    <path d="M0 0 Q0 -8 8 -8 L22 -8 Q30 -8 30 0 L30 8 Q30 16 22 16 L8 16 Q0 16 0 8 Z" fill="url(#logoGradient)" opacity="0.8"/>
    <path d="M8 16 L4 22 L12 16" fill="url(#logoGradient)" opacity="0.8"/>
    <!-- Question Mark -->
    <text x="15" y="12" font-family="Arial, sans-serif" font-size="14" font-weight="bold" fill="white">?</text>
  </g>
  
  <!-- Brand Name -->
  <text x="82" y="32" font-family="'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" font-size="26" font-weight="700" fill="url(#logoGradient)" filter="url(#shadow)">
    Yappin<tspan fill="#1a73e8">DB</tspan>
  </text>
</svg>

